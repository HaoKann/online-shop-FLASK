{% extends 'base.html' %}

{% block content %}

<h1 style="text-align: center;">Ваши заказы</h1>

    {% for order in all_orders %}
    <div class="order">
        <p> Заказ {{ order.user_id }}</p>
        <p> Дата {{ order.date }}</p>
        <p> Сумма {{ order.price }}</p>
       
    {% endfor %}
    </div>
{% endblock %}
