{% extends 'base.html' %}

{% block content %}

<h1 style="text-align: center;">Ваши заказы</h1>

    {% for user_order in current_user.orders.all() %}
        <div class="order">
            <p> Заказ {{ user_order.id }}</p>
            <p> Дата {{ user_order.date }}</p>
            <p> Сумма {{ user_order.price }}₸</p>
        </div>
    {% endfor %}
 
{% endblock %}
