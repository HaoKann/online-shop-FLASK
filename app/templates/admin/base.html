<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Административная панель</title>

    {% block styles %}
        {{ bootstrap.load_css() }}
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% endblock %}

</head>
<body>
    <div class="container">
        <div class="row"> 
            <div class="col-md-2">
                <div class="list-group">
                    <a class="list-group-item active list-group-item-primary" href="{{ url_for('admin_products_list') }}" >Список продуктов</a>
                    <a class="list-group-item active list-group-item-primary" href="{{ url_for('admin_add_product') }}" >Добавить продукт</a>
                    <li class="list-group-item">A third item</li>
                    <li class="list-group-item">A fourth item</li>
                    <li class="list-group-item">And a fifth one</li>
                </div>
            </div>
            <div class="col-md-10">
                {% block content %}

                {% endblock %}
            </div>
        </div>
    </div>






    {% block scripts %}
        {{ bootstrap.load_js() }}
    {% endblock %}

</body>
</html>
