{% extends 'base.html' %}

{% block content %}

<div class="product-details">
    <p>{{product.name}}</p> 

    <p>{{ product.get_category_name() }}</p> <br>

    {% for photo in product.photos.all() %}
        <img style="width: 250px;" src="{{ photo.get_photo() }}" alt="{{ photo.description }}">
    {% endfor %}
</div>




{% endblock %}
